<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cocofresh BD — Find Our Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--g1:#0a3d1f;--g2:#1aac5a;--g3:#a8f0c6;--g4:#f0faf4;--ink:#0d1f10;--ink3:#6a8a6f;--cream:#f8fdf9;--white:#fff;--red:#e24b4a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.header{background:var(--g1);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{font-size:22px;}
.logo-text{font-size:14px;font-weight:700;color:#fff;}
.logo-sub{font-size:10px;color:var(--g3);letter-spacing:2px;text-transform:uppercase;}
.hdr{display:flex;gap:8px;}
.wa-btn{background:var(--g2);border:none;border-radius:30px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:#fff;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.upd-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:30px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);cursor:pointer;}
.upd-btn:hover{color:#fff;background:rgba(255,255,255,0.18);}
.hero{background:var(--g1);padding:44px 20px 52px;text-align:center;position:relative;overflow:hidden;}
.orb1{position:absolute;top:-100px;right:-80px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(26,172,90,0.2) 0%,transparent 65%);}
.orb2{position:absolute;bottom:-100px;left:-60px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(26,172,90,0.12) 0%,transparent 65%);}
.hi{position:relative;z-index:2;}
.hk{font-size:11px;font-weight:700;letter-spacing:5px;color:rgba(168,240,198,0.6);text-transform:uppercase;margin-bottom:12px;}
.ht{font-family:'Fraunces',serif;font-size:48px;font-weight:900;color:#fff;line-height:1.0;margin-bottom:8px;}
.ht em{color:var(--g2);font-style:italic;}
.hs{font-size:15px;color:rgba(255,255,255,0.4);font-weight:300;margin-bottom:24px;}
.lp{display:inline-flex;align-items:center;gap:8px;background:rgba(26,172,90,0.15);border:1.5px solid rgba(26,172,90,0.4);border-radius:40px;padding:10px 22px;}
.ld{width:9px;height:9px;border-radius:50%;background:var(--g2);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(26,172,90,0.25);}50%{box-shadow:0 0 0 7px rgba(26,172,90,0.08);}}
.lt{font-size:13px;font-weight:600;color:var(--g3);}
.main{max-width:600px;margin:0 auto;padding:20px 16px 48px;}
.spin-wrap{text-align:center;padding:48px 20px;color:var(--ink3);}
.spinner{width:32px;height:32px;border:3px solid var(--g4);border-top-color:var(--g2);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.today-card{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(10,61,31,0.08);margin-bottom:18px;}
.tch{background:var(--g2);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;}
.tchl{display:flex;align-items:center;gap:10px;}
.tct{font-size:14px;font-weight:700;color:#fff;}
.tcd{font-size:11px;color:rgba(255,255,255,0.65);}
.tcbg{background:rgba(255,255,255,0.22);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#fff;}
.tcb{padding:18px 20px;}
.tcn{font-size:13px;color:#2d4a32;background:var(--g4);border-radius:10px;padding:10px 14px;margin-bottom:14px;line-height:1.5;}
.stops{display:flex;flex-direction:column;gap:9px;}
.stop{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--cream);border-radius:11px;border:1.5px solid transparent;}
.stop.active{background:var(--g4);border-color:rgba(26,172,90,0.3);}
.stop.done{opacity:0.4;}
.stime{font-size:12px;font-weight:700;color:var(--ink3);width:76px;flex-shrink:0;}
.stop.active .stime{color:var(--g2);}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sdot-active{background:var(--g2);}
.sdot-upcoming{background:#f5a623;}
.sdot-done{background:rgba(0,0,0,0.15);}
.sinfo{flex:1;}
.sname{font-size:14px;font-weight:700;color:var(--ink);}
.stop.active .sname{color:var(--g1);}
.sdetail{font-size:12px;color:var(--ink3);margin-top:1px;}
.stag{font-size:10px;font-weight:700;border-radius:12px;padding:3px 10px;flex-shrink:0;}
.stag-a{background:var(--g2);color:#fff;}
.stag-u{background:rgba(245,166,35,0.15);color:#92400e;}
.stag-d{background:rgba(0,0,0,0.07);color:var(--ink3);}
.nostop{text-align:center;padding:28px;color:var(--ink3);}
.nostop i{font-size:36px;display:block;margin-bottom:8px;}
.sl{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--ink3);text-transform:uppercase;margin-bottom:12px;padding-left:2px;}
.wk{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(10,61,31,0.06);margin-bottom:18px;}
.dr{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border-bottom:1px solid var(--g4);}
.dr:last-child{border-bottom:none;}.dr.tr{background:var(--g4);}
.dl{width:48px;flex-shrink:0;text-align:center;}
.dn{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;}
.dr.tr .dn{color:var(--g2);}
.ddv{width:1px;background:var(--g4);align-self:stretch;flex-shrink:0;}
.dst{flex:1;font-size:13px;}
.dsv{color:var(--ink);font-weight:500;}.dse{color:var(--ink3);font-style:italic;}
.tdb{display:inline-block;font-size:9px;font-weight:700;background:var(--g2);color:#fff;border-radius:9px;padding:2px 6px;margin-top:2px;}
.oc{background:var(--g1);border-radius:16px;padding:22px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;}
.oci{font-size:34px;flex-shrink:0;}
.oct{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px;}
.ocs{font-size:12px;color:rgba(255,255,255,0.42);line-height:1.5;}
.ocb{background:var(--g2);border:none;border-radius:26px;padding:11px 20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:#fff;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;flex-shrink:0;}
.lupd{text-align:center;font-size:11px;color:var(--ink3);margin-bottom:16px;}
.ftr{text-align:center;padding:24px 16px;border-top:1px solid rgba(10,61,31,0.07);}
.fl{font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:3px;}
.fs{font-size:11px;color:var(--ink3);opacity:.55;}
/* ADMIN */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.ov.show{display:flex;}
.pn{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:20px 20px 44px;}
.ph{width:34px;height:4px;background:var(--g4);border-radius:2px;margin:0 auto 18px;}
.pt{font-size:17px;font-weight:700;margin-bottom:3px;}
.ps{font-size:12px;color:var(--ink3);margin-bottom:20px;}
.aw{margin-bottom:18px;}
.ar{display:flex;gap:8px;}
.ai{flex:1;padding:11px 13px;border:1.5px solid rgba(10,61,31,0.15);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;}
.ai:focus{border-color:var(--g2);}
.ab{background:var(--g1);border:none;border-radius:10px;padding:11px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;}
.aerr{font-size:12px;color:var(--red);margin-top:6px;display:none;}
.aerr.show{display:block;}
.es{display:none;}.es.show{display:block;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.fg input,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid rgba(10,61,31,0.15);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;background:var(--white);}
.fg input:focus,.fg textarea:focus{border-color:var(--g2);}
.fg textarea{resize:vertical;min-height:55px;}
.sh{display:grid;grid-template-columns:82px 1fr 90px 32px;gap:7px;margin-bottom:7px;align-items:center;}
.sh input{padding:8px 9px;border:1.5px solid rgba(10,61,31,0.15);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;width:100%;}
.sh input:focus{border-color:var(--g2);}
.dsb{background:none;border:1.5px solid rgba(220,50,50,0.2);border-radius:7px;width:32px;height:34px;cursor:pointer;color:#c94040;font-size:13px;display:flex;align-items:center;justify-content:center;}
.addb{background:var(--g4);border:1.5px dashed rgba(26,172,90,0.35);border-radius:8px;padding:9px;width:100%;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--g2);cursor:pointer;margin-bottom:14px;}
.wed{background:var(--cream);border-radius:11px;padding:12px;margin-bottom:14px;}
.wet{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;margin-bottom:10px;}
.wer{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.wedy{font-size:12px;font-weight:700;width:36px;flex-shrink:0;}
.wer input{flex:1;padding:8px 10px;border:1.5px solid rgba(10,61,31,0.12);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);outline:none;}
.wer input:focus{border-color:var(--g2);}
.svb{width:100%;background:var(--g2);border:none;border-radius:11px;padding:15px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:9px;}
.svb:disabled{opacity:.6;cursor:wait;}
.clb{width:100%;background:none;border:1.5px solid rgba(10,61,31,0.12);border-radius:11px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink3);cursor:pointer;}
.msg{border-radius:9px;padding:11px;text-align:center;font-size:13px;font-weight:600;margin-bottom:10px;display:none;}
.msg.show{display:block;}
.msg.ok{background:var(--g4);border:1.5px solid rgba(26,172,90,0.3);color:var(--g1);}
.msg.err{background:#fff5f5;border:1.5px solid #fca5a5;color:#7f1d1d;}
@media(max-width:460px){.ht{font-size:36px;}.sh{grid-template-columns:72px 1fr 76px 28px;}.oc{flex-direction:column;text-align:center;}}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-icon">🥥</div>
    <div><div class="logo-text">Cocofresh BD</div><div class="logo-sub">Cart Tracker</div></div>
  </div>
  <div class="hdr">
    <a class="wa-btn" href="https://wa.me/8801410586224" target="_blank">📲 Order</a>
    <button class="upd-btn" onclick="openAdmin()">Update ✏️</button>
  </div>
</header>

<div class="hero">
  <div class="orb1"></div><div class="orb2"></div>
  <div class="hi">
    <div class="hk">Live location</div>
    <div class="ht">Find our <em>cart.</em></div>
    <div class="hs">Updated every morning — bookmark this page</div>
    <div class="lp"><div class="ld"></div><span class="lt" id="live-txt">Loading...</span></div>
  </div>
</div>

<div class="main" id="mc">
  <div class="spin-wrap"><div class="spinner"></div><div>Loading today's location...</div></div>
</div>

<div class="ov" id="ov">
  <div class="pn">
    <div class="ph"></div>
    <div class="pt">Update Cart Location</div>
    <div class="ps">Changes go live instantly for all customers</div>
    <div class="aw" id="aw">
      <div class="ar">
        <input class="ai" type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()"/>
        <button class="ab" onclick="checkPw()">Unlock</button>
      </div>
      <div class="aerr" id="aerr">Wrong password.</div>
    </div>
    <div class="es" id="es">
      <div class="msg ok" id="msg-ok"></div>
      <div class="msg err" id="msg-err"></div>
      <div class="fg">
        <label>Today's note (optional)</label>
        <textarea id="e-note" placeholder="e.g. Super cold cups today ☀️ Come find us!"></textarea>
      </div>
      <div class="fg">
        <label>Today's stops</label>
        <div id="stops-ed"></div>
        <button class="addb" onclick="addStop()">+ Add stop</button>
      </div>
      <div class="fg">
        <label>This week's route</label>
        <div class="wed"><div class="wet">One line per day</div><div id="wed-rows"></div></div>
      </div>
      <button class="svb" id="svb" onclick="saveAll()">💾 Save & Go Live</button>
      <button class="clb" onclick="closeAdmin()">Close</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const BIN_ID  = '69f117b6856a682189837a8d';
const API_KEY = '$2a$10$nLuWhdRMR1SZ5Q55ZBm8cuD2ONNdX8C268sQTuTH4AqgkvimzrwE2';
const PW      = 'coco2026';

// JSONBin v3 endpoints — with no-cors workaround via proxy
const READ_URL  = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
const WRITE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const WD   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MO   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let liveData = null;

const DEF = {
  today:{note:'',stops:[
    {time:'2:00 PM',location:'Zindabazar',detail:'Near main road'},
    {time:'5:30 PM',location:'Amberkhana',detail:'By the mosque'}
  ]},
  week:{Mon:'Zindabazar & Amberkhana',Tue:'Subhanighat & Bondor Bazar',Wed:'SUST Gate & Tilagor',Thu:'Amberkhana & Modina Market',Fri:'Zindabazar & Airport Road',Sat:'Bondor Bazar & Laldighirpar',Sun:'Delivery only — WhatsApp by 10am'},
  lastUpdated:''
};

// ── FETCH ──
async function fetchData() {
  try {
    const r = await fetch(READ_URL, {
      method: 'GET',
      headers: {
        'X-Master-Key': API_KEY,
        'X-Bin-Meta': 'false'
      }
    });
    if (!r.ok) throw new Error('Status ' + r.status);
    const d = await r.json();
    localStorage.setItem('cf_cache', JSON.stringify(d));
    return d;
  } catch(e) {
    console.warn('Fetch failed, using cache:', e.message);
    try { return JSON.parse(localStorage.getItem('cf_cache')) || DEF; }
    catch(e2) { return DEF; }
  }
}

// ── PUSH ──
async function pushData(data) {
  const r = await fetch(WRITE_URL, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': API_KEY,
      'X-Bin-Versioning': 'false'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`${r.status}: ${txt}`);
  }
  return await r.json();
}

// ── HELPERS ──
function parseTime(str) {
  if (!str) return null;
  const m = str.match(/(\d+)(?::(\d+))?\s*(AM|PM)/i);
  if (!m) return null;
  let h = parseInt(m[1]), mi = parseInt(m[2]||'0');
  if (m[3].toUpperCase()==='PM' && h!==12) h+=12;
  if (m[3].toUpperCase()==='AM' && h===12) h=0;
  return h*60+mi;
}
function calcStatus(stops) {
  const now = new Date(), nm = now.getHours()*60+now.getMinutes();
  return stops.map(s=>{
    const t = parseTime(s.time);
    if (t===null) return {...s,st:'upcoming'};
    if (t+90<nm)  return {...s,st:'done'};
    if (t<=nm)    return {...s,st:'active'};
    return {...s,st:'upcoming'};
  });
}

// ── RENDER ──
function render(data) {
  liveData = data;
  const now = new Date(), td = WD[now.getDay()];
  const dateStr = `${WD[now.getDay()]}, ${now.getDate()} ${MO[now.getMonth()]} ${now.getFullYear()}`;
  const stops = calcStatus(data.today?.stops||[]);
  const act = stops.find(s=>s.st==='active');
  const nxt = stops.find(s=>s.st==='upcoming');

  const lt = document.getElementById('live-txt');
  if      (act)          lt.textContent = `We're at ${act.location} right now 📍`;
  else if (nxt)          lt.textContent = `Next: ${nxt.location} at ${nxt.time}`;
  else if (stops.length) lt.textContent = 'Done for today — order delivery!';
  else                   lt.textContent = 'Check back tomorrow for locations';

  const stopsHTML = stops.length ? stops.map(s=>`
    <div class="stop ${s.st}">
      <div class="stime">${s.time||''}</div>
      <div class="sdot sdot-${s.st}"></div>
      <div class="sinfo"><div class="sname">${s.location||''}</div><div class="sdetail">${s.detail||''}</div></div>
      ${s.st==='active'?'<span class="stag stag-a">Here now</span>':s.st==='upcoming'?'<span class="stag stag-u">Coming up</span>':'<span class="stag stag-d">Done</span>'}
    </div>`).join('')
    : '<div class="nostop"><i>📍</i>No stops set yet — check back in the morning!</div>';

  const weekHTML = DAYS.map(d=>{
    const isT = d===td, v = data.week?.[d]||'';
    return `<div class="dr${isT?' tr':''}">
      <div class="dl"><div class="dn">${d}</div>${isT?'<div class="tdb">Today</div>':''}</div>
      <div class="ddv"></div>
      <div class="dst">${v?`<div class="dsv">${v}</div>`:'<div class="dse">TBC</div>'}</div>
    </div>`;
  }).join('');

  const lu = data.lastUpdated
    ? `<div class="lupd">🕐 Last updated: ${new Date(data.lastUpdated).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>` : '';

  document.getElementById('mc').innerHTML = `
    <div class="today-card">
      <div class="tch">
        <div class="tchl"><span style="font-size:20px">🛒</span>
          <div><div class="tct">Today's Schedule</div><div class="tcd">${dateStr}</div></div>
        </div>
        <div class="tcbg">${act?'Live now':nxt?'Coming up':'Updated'}</div>
      </div>
      <div class="tcb">
        ${data.today?.note?`<div class="tcn">💬 ${data.today.note}</div>`:''}
        <div class="stops">${stopsHTML}</div>
      </div>
    </div>
    <div class="sl">This week's route</div>
    <div class="wk">${weekHTML}</div>
    <div class="oc">
      <div class="oci">📦</div>
      <div><div class="oct">Can't find us? Order delivery.</div><div class="ocs">WhatsApp by 10am — delivered fresh anywhere in Sylhet.</div></div>
      <a class="ocb" href="https://wa.me/8801410586224?text=Hi%20Cocofresh%20BD%2C%20I%20want%20to%20order%20delivery%20today" target="_blank">Order →</a>
    </div>
    ${lu}
    <div class="ftr"><div class="fl">COCOFRESH BD · SYLHET</div><div class="fs">cocofreshbd.com · 01410586224</div></div>`;
}

// ── ADMIN ──
function openAdmin() {
  document.getElementById('ov').classList.add('show');
  setTimeout(()=>document.getElementById('pw').focus(),200);
}
function closeAdmin() {
  document.getElementById('ov').classList.remove('show');
  document.getElementById('es').classList.remove('show');
  document.getElementById('aw').style.display='block';
  document.getElementById('pw').value='';
  document.getElementById('aerr').classList.remove('show');
  document.getElementById('msg-ok').classList.remove('show');
  document.getElementById('msg-err').classList.remove('show');
}
function checkPw() {
  if (document.getElementById('pw').value===PW) {
    document.getElementById('aw').style.display='none';
    document.getElementById('es').classList.add('show');
    buildForm();
  } else {
    document.getElementById('aerr').classList.add('show');
  }
}
function buildForm() {
  const d = liveData||DEF;
  document.getElementById('e-note').value = d.today?.note||'';
  buildStops(d.today?.stops||[]);
  buildWeek(d.week||{});
}
function buildStops(stops) {
  document.getElementById('stops-ed').innerHTML = stops.map((s,i)=>`
    <div class="sh" id="sr${i}">
      <input id="st${i}" placeholder="2:00 PM" value="${s.time||''}"/>
      <input id="sl${i}" placeholder="Location name" value="${s.location||''}"/>
      <input id="sd${i}" placeholder="Area detail" value="${s.detail||''}"/>
      <button class="dsb" onclick="delStop(${i})">✕</button>
    </div>`).join('');
}
function addStop() { buildStops([...getStops(),{time:'',location:'',detail:''}]); }
function delStop(i) { const s=getStops(); s.splice(i,1); buildStops(s); }
function getStops() {
  return Array.from(document.querySelectorAll('[id^="sr"]'))
    .map((_,i)=>({
      time:document.getElementById('st'+i)?.value||'',
      location:document.getElementById('sl'+i)?.value||'',
      detail:document.getElementById('sd'+i)?.value||''
    }));
}
function buildWeek(w) {
  document.getElementById('wed-rows').innerHTML = DAYS.map(d=>`
    <div class="wer"><div class="wedy">${d}</div>
      <input id="we${d}" placeholder="${d}'s areas" value="${w[d]||''}"/>
    </div>`).join('');
}

async function saveAll() {
  const btn = document.getElementById('svb');
  btn.disabled=true; btn.textContent='Saving...';
  document.getElementById('msg-ok').classList.remove('show');
  document.getElementById('msg-err').classList.remove('show');

  const newData = {
    today:{ note:document.getElementById('e-note').value, stops:getStops() },
    week:{},
    lastUpdated: new Date().toISOString()
  };
  DAYS.forEach(d=>{ const el=document.getElementById('we'+d); if(el) newData.week[d]=el.value; });

  try {
    await pushData(newData);
    // Cache locally too
    localStorage.setItem('cf_cache', JSON.stringify(newData));
    liveData = newData;
    render(newData);
    const ok = document.getElementById('msg-ok');
    ok.textContent = '✅ Saved! All customers can see the updated location now.';
    ok.classList.add('show');
  } catch(e) {
    console.error('Save error:', e);
    const err = document.getElementById('msg-err');
    err.textContent = '❌ Failed to save: ' + e.message + '. Check your JSONBin account is active.';
    err.classList.add('show');
  }
  btn.disabled=false; btn.textContent='💾 Save & Go Live';
}

document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeAdmin();});

// ── INIT ──
async function init() {
  const data = await fetchData();
  render(data);
  setInterval(async()=>{ const d=await fetchData(); render(d); }, 2*60*1000);
}
init();
</script>
